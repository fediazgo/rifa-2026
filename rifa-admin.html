<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin – Rifa Premium</title>

<style>
body{font-family:Arial;background:#111;color:#fff;margin:0;padding:20px}
.login{max-width:300px;margin:100px auto;text-align:center}
input{width:100%;padding:10px;margin:10px 0}
button{padding:10px;width:100%;cursor:pointer}
table{width:100%;border-collapse:collapse;margin-top:20px}
th,td{border:1px solid #444;padding:8px;text-align:left}
th{background:#222}
.btn{padding:5px 10px;margin:2px;cursor:pointer}
</style>
</head>

<body>

<div id="login" class="login">
  <h2>🔐 Admin Rifa</h2>
  <input type="password" id="pwd" placeholder="Contraseña">
  <button onclick="login()">Ingresar</button>
  <p id="err" style="color:red;display:none">Contraseña incorrecta</p>
</div>

<div id="panel" style="display:none">
  <h2>📊 Panel de Control</h2>
  <button onclick="load()">🔄 Actualizar</button>

  <table>
    <thead>
      <tr>
        <th>Número</th>
        <th>Nombre</th>
        <th>WhatsApp</th>
        <th>Estado</th>
        <th>Acciones</th>
      </tr>
    </thead>
    <tbody id="data"></tbody>
  </table>
</div>

<script>
var SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxWIa-F1eeETn6GbXvlHcQQtr9oOhi2WcFVjW1y77neoFQBp8mqzCsuiBdmeX-pkcCS/exec";
var pwd = "";

function login(){
  pwd = document.getElementById("pwd").value;

  fetch(SCRIPT_URL + "?action=list&pwd=" + pwd)
  .then(r=>r.json())
  .then(res=>{
    if(res.ok){
      document.getElementById("login").style.display="none";
      document.getElementById("panel").style.display="block";
      render(res.data);
    }else{
      document.getElementById("err").style.display="block";
    }
  });
}

function load(){
  fetch(SCRIPT_URL + "?action=list&pwd=" + pwd)
  .then(r=>r.json())
  .then(res=>{
    if(res.ok){
      render(res.data);
    }
  });
}

function render(data){
  var html="";
  data.forEach(r=>{
    html+=`
    <tr>
      <td>${r.numero}</td>
      <td>${r.nombre}</td>
      <td>${r.wa}</td>
      <td>${r.estado}</td>
      <td>
        ${r.estado==="pendiente"
          ? `<button class="btn" onclick="pay('${r.id}')">✅ Pagado</button>`
          : `<button class="btn" onclick="unpay('${r.id}')">↩ Revertir</button>`}
        <button class="btn" onclick="del('${r.id}')">❌</button>
      </td>
    </tr>`;
  });

  document.getElementById("data").innerHTML = html;
}

function pay(id){
  fetch(SCRIPT_URL + "?action=pay&id="+id+"&pwd="+pwd)
  .then(r=>r.json())
  .then(()=>load());
}

function unpay(id){
  fetch(SCRIPT_URL + "?action=unpay&id="+id+"&pwd="+pwd)
  .then(r=>r.json())
  .then(()=>load());
}

function del(id){
  fetch(SCRIPT_URL + "?action=delete&id="+id+"&pwd="+pwd)
  .then(r=>r.json())
  .then(()=>load());
}
</script>

</body>
</html>
