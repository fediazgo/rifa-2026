```html
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Rifa Premium</title>

<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&family=Bebas+Neue&display=swap" rel="stylesheet">

<style>
:root{
 --blue:#1A6FD4;
 --navy:#0D3B7A;
 --green:#17B86A;
 --red:#E03434;
 --bg:#EEF5FF;
 --shadow:0 10px 30px rgba(0,0,0,0.2);
}

body{
 margin:0;
 font-family:'Nunito',sans-serif;
 background:linear-gradient(135deg,var(--navy),var(--blue));
 text-align:center;
 color:white;
}

.container{
 max-width:1100px;
 margin:30px auto;
 background:white;
 color:#0D2545;
 border-radius:20px;
 padding:25px;
 box-shadow:var(--shadow);
}

h1{
 font-family:'Bebas Neue';
 font-size:40px;
 color:#0D3B7A;
}

.numero{
 padding:18px;
 border-radius:12px;
 background:#e9eef7;
 font-weight:900;
 cursor:pointer;
}

.selected{background:#17B86A;color:white;}
.reservado{background:#FFD966;}
.pagado{background:#E03434;color:white;}

.numbers-grid{
 display:grid;
 grid-template-columns:repeat(auto-fit,minmax(70px,1fr));
 gap:10px;
}

button{
 margin-top:20px;
 padding:12px 25px;
 border:none;
 border-radius:30px;
 background:#17B86A;
 color:white;
 font-weight:bold;
 cursor:pointer;
}

/* MODAL */
#modal{
 display:none;
 position:fixed;
 top:0;left:0;
 width:100%;height:100%;
 background:rgba(0,0,0,.5);
 justify-content:center;
 align-items:center;
}

.modal-box{
 background:white;
 padding:20px;
 border-radius:15px;
 color:black;
 width:300px;
}

/* TICKET */
#ticket{
 display:none;
 position:fixed;
 top:0;left:0;
 width:100%;height:100%;
 background:rgba(0,0,0,.6);
 justify-content:center;
 align-items:center;
}
.ticket-box{
 background:white;
 padding:25px;
 border-radius:15px;
 text-align:center;
}
</style>
</head>

<body>

<div class="container">
<h1>🎟 Rifa Dispensador + Whiskey</h1>

<div id="grid" class="numbers-grid"></div>

<button onclick="abrirModal()">Reservar</button>
</div>

<!-- MODAL FORM -->
<div id="modal">
 <div class="modal-box">
  <h3>Datos</h3>
  <input id="nombre" placeholder="Nombre"><br><br>
  <input id="wa" placeholder="WhatsApp"><br><br>
  <input id="correo" placeholder="Correo (opcional)"><br><br>
  <button onclick="confirmarReserva()">Confirmar</button>
 </div>
</div>

<!-- TICKET -->
<div id="ticket">
 <div class="ticket-box">
  <h2>✅ Reserva exitosa</h2>
  <p id="ticketNums"></p>
  <button onclick="cerrarTicket()">OK</button>
 </div>
</div>

<audio id="sound-ok">
<source src="https://assets.mixkit.co/sfx/preview/mixkit-achievement-bell-600.mp3">
</audio>

<script>
const API_URL="https://script.google.com/macros/s/AKfycbxrLfMOdW-KBX0ZsdtGksay-aKwhVmY7lPSwANUpmklCHayRJhn8T9fJ2YJp2q-03sg/exec";
const WHATSAPP_NUMBER="3246860209";
const PRECIO=20000;

let estados={},selected=[],bloqueado=false;

async function cargar(){
 let r=await fetch(API_URL+"?action=status");
 let j=await r.json();
 estados=j.data||{};
 pintar();
}

function pintar(){
 let g=document.getElementById("grid");
 g.innerHTML="";

 for(let i=1;i<=100;i++){
  let d=document.createElement("div");
  d.className="numero";
  d.innerText=i;

  let estado=estados[i]?.estado;

  if(estado==="pagado"){
    d.classList.add("pagado");
  }else if(estado==="pendiente"){
    d.classList.add("reservado");
  }else if(selected.includes(i)){
    d.classList.add("selected");
  }else{
    d.onclick=()=>{
      let idx=selected.indexOf(i);
      if(idx==-1) selected.push(i);
      else selected.splice(idx,1);
      pintar();
    }
  }

  g.appendChild(d);
 }
}

function abrirModal(){
 if(selected.length==0){
  alert("Selecciona números");
  return;
 }
 document.getElementById("modal").style.display="flex";
}

async function confirmarReserva(){

 if(bloqueado) return;
 bloqueado=true;

 let n=document.getElementById("nombre").value;
 let w=document.getElementById("wa").value;
 let c=document.getElementById("correo").value;

 if(!n || !w){
  alert("Completa datos");
  bloqueado=false;
  return;
 }

 for(let num of selected){
  await fetch(API_URL+"?action=register&numero="+num+
  "&nombre="+encodeURIComponent(n)+
  "&wa="+encodeURIComponent(w)+
  "&correo="+encodeURIComponent(c));
 }

 let msg=`SOLICITUD RIFA\nNumeros: ${selected.join(",")}`;

 window.open(`https://wa.me/57${WHATSAPP_NUMBER}?text=${encodeURIComponent(msg)}`,"_blank");

 document.getElementById("sound-ok").play();

 document.getElementById("ticket").style.display="flex";
 document.getElementById("ticketNums").innerText=selected.join(", ");

 selected=[];
 document.getElementById("modal").style.display="none";

 setTimeout(()=>{
  cargar();
  bloqueado=false;
 },1500);
}

function cerrarTicket(){
 document.getElementById("ticket").style.display="none";
}

cargar();
</script>

</body>
</html>
```
