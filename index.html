<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rifa Premium – Dispensador de Licor 🥃</title>

<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Bebas+Neue&display=swap" rel="stylesheet">

<style>
body{font-family:'Nunito',sans-serif;background:#EEF5FF;margin:0}

/* HEADER */
header{
  background:linear-gradient(135deg,#0D3B7A,#1A6FD4);
  color:white;
  text-align:center;
  padding:50px 20px;
}

h1{
  font-family:'Bebas Neue',sans-serif;
  font-size:60px;
  margin:0;
}

h1 span{color:#FFD700}

.countdown-box{
  margin:20px 0;
  font-weight:800;
}

.prize-img{
  width:300px;
  border-radius:20px;
  margin-top:20px;
  box-shadow:0 10px 30px rgba(0,0,0,.4);
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(10,1fr);
  gap:6px;
  max-width:700px;
  margin:30px auto;
  background:white;
  padding:20px;
  border-radius:20px;
}

.num-btn{
  padding:12px;
  border-radius:10px;
  border:2px solid #C8E0FF;
  background:white;
  font-weight:800;
  cursor:pointer;
}

.num-btn:hover{
  background:#1A6FD4;
  color:white;
}

.num-btn.pending{
  background:#FFF3E0;
  color:#FF6B2B;
  cursor:not-allowed;
}

.num-btn.paid{
  background:#E8F5E9;
  color:#17B86A;
  cursor:not-allowed;
}

/* MODAL */
.overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.7);
  display:none;
  justify-content:center;
  align-items:center;
}

.modal{
  background:white;
  padding:25px;
  border-radius:15px;
  width:320px;
}

input{
  width:100%;
  padding:10px;
  margin:6px 0;
  border:1px solid #ccc;
  border-radius:8px;
}

button{
  width:100%;
  padding:12px;
  background:#1A6FD4;
  color:white;
  border:none;
  border-radius:10px;
  font-weight:800;
  cursor:pointer;
}
</style>
</head>

<body>

<header>
  <h1>GRAN RIFA <span>PREMIUM</span></h1>

  <div class="countdown-box">
    ⏳ <span id="countdown"></span>
  </div>

  <img src="dispensador_a.jpg" class="prize-img">
</header>

<div class="grid" id="grid"></div>

<!-- MODAL -->
<div class="overlay" id="overlay">
  <div class="modal">
    <h3>Número <span id="num"></span></h3>

    <input id="nombre" placeholder="Nombre completo">
    <input id="wa" placeholder="WhatsApp">
    <input id="correo" placeholder="Correo (opcional)">

    <button id="btnGuardar">Reservar mi número</button>
  </div>
</div>

<script>
var SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxrLfMOdW-KBX0ZsdtGksay-aKwhVmY7lPSwANUpmklCHayRJhn8T9fJ2YJp2q-03sg/exec";

var estados = {};
var seleccionado = null;

/* CONTADOR */
var targetDate = new Date("May 2, 2026 20:00:00").getTime();

setInterval(function(){
  var now = new Date().getTime();
  var diff = targetDate - now;

  if(diff < 0){
    document.getElementById("countdown").innerHTML = "🎉 SORTEO EN CURSO";
    return;
  }

  var d = Math.floor(diff / (1000*60*60*24));
  var h = Math.floor((diff % (1000*60*60*24)) / (1000*60*60));
  var m = Math.floor((diff % (1000*60*60)) / (1000*60));
  var s = Math.floor((diff % (1000*60)) / 1000);

  document.getElementById("countdown").innerHTML =
    d+"d "+h+"h "+m+"m "+s+"s";
},1000);

/* INICIO */
window.onload = function(){
  cargar();

  document.getElementById("btnGuardar").onclick = guardar;
};

/* CARGAR ESTADOS */
function cargar(){
  fetch(SCRIPT_URL + "?action=status")
  .then(r=>r.json())
  .then(d=>{
    estados = d.data || {};
    pintar();
  });
}

/* GRID */
function pintar(){
  var grid = document.getElementById("grid");
  grid.innerHTML = "";

  for(let i=0;i<100;i++){
    let n = i<10 ? "0"+i : ""+i;
    let btn = document.createElement("button");
    btn.className = "num-btn";
    btn.textContent = n;

    let est = estados[n];

    if(est=="pagado"){
      btn.classList.add("paid");
      btn.disabled=true;
    }
    else if(est=="pendiente"){
      btn.classList.add("pending");
      btn.disabled=true;
    }
    else{
      btn.onclick = ()=>abrir(n);
    }

    grid.appendChild(btn);
  }
}

/* ABRIR MODAL */
function abrir(n){
  seleccionado = n;
  document.getElementById("num").textContent = n;
  document.getElementById("overlay").style.display="flex";
}

/* GUARDAR */
function guardar(){
  let nombre = document.getElementById("nombre").value.trim();
  let wa = document.getElementById("wa").value.trim();
  let correo = document.getElementById("correo").value.trim();

  if(!nombre || !wa){
    alert("Completa nombre y WhatsApp");
    return;
  }

  fetch(SCRIPT_URL + "?action=register"
    +"&numero="+encodeURIComponent(seleccionado)
    +"&nombre="+encodeURIComponent(nombre)
    +"&wa="+encodeURIComponent(wa)
    +"&correo="+encodeURIComponent(correo))
  .then(r=>r.json())
  .then(d=>{
    if(d.ok){
      estados[seleccionado]="pendiente";
      pintar();
      document.getElementById("overlay").style.display="none";
      alert("✅ Número reservado correctamente");
    }else{
      alert("Error: " + d.msg);
    }
  });
}

// CONTADOR
var targetDate = new Date("May 2, 2026 20:00:00").getTime();

setInterval(function(){
  var now = new Date().getTime();
  var diff = targetDate - now;

  if(diff < 0){
    document.getElementById("countdown").innerHTML = "🎉 ¡SORTEO EN CURSO!";
    return;
  }

  var d = Math.floor(diff / (1000*60*60*24));
  var h = Math.floor((diff % (1000*60*60*24)) / (1000*60*60));
  var m = Math.floor((diff % (1000*60*60)) / (1000*60));
  var s = Math.floor((diff % (1000*60)) / 1000);

  document.getElementById("countdown").innerHTML =
    d + "d " + h + "h " + m + "m " + s + "s";
},1000);

</script>

</body>
</html>
