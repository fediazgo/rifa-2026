<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rifa Premium</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>
body{
 font-family:Inter;
 margin:0;
 background:linear-gradient(135deg,#0f2a5c,#1e4db7);
 color:#fff;
}

/* CONTENEDOR */
.container{
 max-width:1100px;
 margin:auto;
 padding:20px;
 text-align:center;
}

/* TITULO */
.titulo{
 font-size:32px;
 font-weight:800;
 margin-bottom:5px;
}

.subtitulo{
 font-size:14px;
 opacity:.9;
}

/* IMAGEN */
.premio-img{
 width:220px;
 margin-top:15px;
 border-radius:20px;
 box-shadow:0 20px 40px rgba(0,0,0,0.4);
 transition:.3s;
}
.premio-img:hover{transform:scale(1.08);}

.premio-text{
 color:#ffd966;
 font-weight:600;
 margin-top:10px;
}

/* CONTADOR */
.contador{
 margin-top:15px;
 font-size:18px;
 font-weight:700;
}

/* LEYENDA */
.leyenda{
 display:flex;
 justify-content:center;
 flex-wrap:wrap;
 gap:10px;
 margin:15px 0;
}

.item{
 display:flex;
 align-items:center;
 gap:6px;
 background:#fff;
 color:#000;
 padding:6px 12px;
 border-radius:20px;
 font-size:12px;
 font-weight:600;
}

.box{width:12px;height:12px;border-radius:50%;}
.libre{background:#ccc}
.seleccionado{background:#2c6e2e}
.reservado{background:#ffd966}
.pagado{background:#e53935}

/* GRID */
.numbers-grid{
 display:grid;
 grid-template-columns:repeat(auto-fit,minmax(65px,1fr));
 gap:12px;
 max-width:900px;
 margin:20px auto;
 padding:20px;
 background:#fff;
 border-radius:20px;
 box-shadow:0 10px 30px rgba(0,0,0,0.25);
}

.numero{
 padding:16px;
 border-radius:12px;
 background:#f1f1f1;
 cursor:pointer;
 font-weight:800;
 font-size:18px;
 color:#333;
 display:flex;
 align-items:center;
 justify-content:center;
 transition:.2s;
}

.numero:hover{
 transform:scale(1.08);
 box-shadow:0 6px 15px rgba(0,0,0,0.2);
}

.numero.selected{background:#2c6e2e;color:#fff;}
.numero.reservado{background:#ffd966;color:#000;}
.numero.pagado{background:#e53935;color:#fff;}

/* BOTON */
.btn{
 display:block;
 margin:30px auto;
 padding:14px 30px;
 border:none;
 border-radius:25px;
 background:#25D366;
 color:#fff;
 font-weight:700;
 font-size:16px;
 cursor:pointer;
}

/* MODAL */
.modal{
 display:none;
 position:fixed;
 top:0;left:0;
 width:100%;height:100%;
 background:rgba(0,0,0,0.7);
 justify-content:center;
 align-items:center;
}

.modal-box{
 background:#fff;
 color:#000;
 padding:25px;
 border-radius:20px;
 width:90%;
 max-width:350px;
}

.modal-box input{
 width:100%;
 padding:10px;
 margin:8px 0;
 border-radius:10px;
 border:1px solid #ccc;
}

.resumen{
 background:#f4f4f4;
 padding:10px;
 border-radius:10px;
 margin-top:10px;
}

.btn-confirm{
 width:100%;
 padding:12px;
 margin-top:10px;
 background:#25D366;
 color:#fff;
 border:none;
 border-radius:15px;
 font-weight:700;
}

/* TOAST */
.toast{
 position:fixed;
 bottom:30px;
 left:50%;
 transform:translateX(-50%) translateY(100px);
 background:#2c6e2e;
 color:#fff;
 padding:15px 20px;
 border-radius:15px;
 opacity:0;
 transition:.4s;
}

.toast.show{
 opacity:1;
 transform:translateX(-50%) translateY(0);
}
</style>
</head>

<body>

<div class="container">

<h1 class="titulo">🎟 Rifa Dispensador + Whiskey</h1>
<p class="subtitulo">$20.000 COP • Lotería de Boyacá • 2 Mayo 2026</p>

<img src="dispensador_a.jpg" class="premio-img">
<p class="premio-text">Dispensador de licor en madera + Whiskey</p>

<div class="contador">
🎯 Disponibles: <span id="disponibles">100</span>
</div>

<div class="leyenda">
 <div class="item"><span class="box libre"></span> Libre</div>
 <div class="item"><span class="box seleccionado"></span> Seleccionado</div>
 <div class="item"><span class="box reservado"></span> Reservado</div>
 <div class="item"><span class="box pagado"></span> Pagado</div>
</div>

<p id="loading">⏳ Cargando números...</p>

<div class="numbers-grid" id="grid"></div>

<button class="btn" onclick="sendWhatsApp()">Reservar</button>

</div>

<div id="toast" class="toast"></div>

<!-- MODAL -->
<div id="modal" class="modal">
 <div class="modal-box">
  <h3>Completa tus datos</h3>

  <input type="text" id="nombre" placeholder="Nombre">
  <input type="text" id="wa" placeholder="WhatsApp">

  <div class="resumen">
    <p id="resumenNumeros"></p>
    <p id="resumenTotal"></p>
  </div>

  <button class="btn-confirm" onclick="confirmarReserva()">Confirmar</button>
 </div>
</div>

<script>
const API_URL="https://script.google.com/macros/s/AKfycbxrLfMOdW-KBX0ZsdtGksay-aKwhVmY7lPSwANUpmklCHayRJhn8T9fJ2YJp2q-03sg/exec";
const WHATSAPP_NUMBER="3246860209";
const PRECIO=20000;

let estados={},selected=[];

async function cargar(){
 let r=await fetch(API_URL+"?action=status");
 let j=await r.json();
 if(j.ok){
  estados=j.data;
  document.getElementById("disponibles").innerText=j.stats.disponibles;
  pintar();
  document.getElementById("loading").style.display="none";
 }
}

function pintar(){
 let g=document.getElementById("grid");
 g.innerHTML="";
 for(let i=1;i<=100;i++){
  let d=document.createElement("div");
  d.className="numero";
  d.innerText=i;

  if(estados[i]){
    if(estados[i].estado=="pendiente") d.classList.add("reservado");
    if(estados[i].estado=="pagado") d.classList.add("pagado");
  } else if(selected.includes(i)){
    d.classList.add("selected");
  }

  if(!estados[i]){
    d.onclick=()=>{
      let idx=selected.indexOf(i);
      if(idx==-1) selected.push(i);
      else selected.splice(idx,1);
      pintar();
    }
  }

  g.appendChild(d);
 }
}

function sendWhatsApp(){
 if(selected.length==0)return alert("Selecciona números");

 document.getElementById("modal").style.display="flex";
 document.getElementById("resumenNumeros").innerText="Números: "+selected.join(", ");
 document.getElementById("resumenTotal").innerText="Total: $"+(selected.length*PRECIO).toLocaleString("es-CO");
}

async function confirmarReserva(){
 let n=document.getElementById("nombre").value;
 let w=document.getElementById("wa").value;

 if(!n||!w)return alert("Completa datos");

 for(let num of selected){
  await fetch(API_URL+"?action=register&numero="+num+"&nombre="+n+"&wa="+w);
 }

 let msg=`SOLICITUD DE RESERVA\nNúmeros: ${selected.join(",")}`;
 window.open(`https://wa.me/${WHATSAPP_NUMBER}?text=${encodeURIComponent(msg)}`);

 showToast("🎉 Reserva realizada. Haz tu pago y participa 🍀");

 selected=[];
 document.getElementById("modal").style.display="none";
 cargar();
}

function showToast(t){
 let toast=document.getElementById("toast");
 toast.innerText=t;
 toast.classList.add("show");
 setTimeout(()=>toast.classList.remove("show"),4000);
}

cargar();
setInterval(cargar,10000);
</script>

</body>
</html>
