<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Rifa Premium</title>

<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&family=Bebas+Neue&display=swap" rel="stylesheet">

<style>
:root{
 --blue:#1A6FD4;
 --navy:#0D3B7A;
 --green:#17B86A;
 --yellow:#FFD700;
 --red:#E03434;
 --bg:#EEF5FF;
 --white:#fff;
 --shadow:0 10px 30px rgba(0,0,0,0.2);
}

body{
 margin:0;
 font-family:'Nunito',sans-serif;
 background:linear-gradient(135deg,var(--navy),var(--blue));
 color:white;
 text-align:center;
}

/* CONTENEDOR */
.container{
 max-width:1100px;
 margin:30px auto;
 background:white;
 color:#0D2545;
 border-radius:20px;
 padding:25px;
 box-shadow:var(--shadow);
}

/* TITULOS */
h1{
 font-family:'Bebas Neue';
 font-size:40px;
 margin:0;
 color:var(--navy);
 letter-spacing:1px;
}

.sub{
 font-weight:700;
 color:#3A5A8A;
 margin-bottom:15px;
}

/* IMAGEN */
.premio-img{
 width:220px;
 border-radius:20px;
 margin:15px 0;
 box-shadow:0 10px 25px rgba(0,0,0,0.3);
}

/* DISPONIBLES */
.dispo{
 font-size:18px;
 font-weight:800;
 margin:10px 0;
}

/* GRID */
.numbers-grid{
 display:grid;
 grid-template-columns:repeat(auto-fit,minmax(70px,1fr));
 gap:12px;
 margin-top:20px;
}

/* NUMEROS */
.numero{
 padding:18px;
 border-radius:12px;
 background:#e9eef7;
 font-weight:900;
 font-size:20px;
 cursor:pointer;
 transition:.2s;
}

.numero:hover{
 transform:scale(1.08);
}

.selected{background:var(--green);color:white;}
.reservado{background:#FFD966;}
.pagado{background:var(--red);color:white;}

/* BOTON */
button{
 margin-top:25px;
 padding:14px 30px;
 border:none;
 border-radius:30px;
 background:var(--green);
 color:white;
 font-size:16px;
 font-weight:900;
 cursor:pointer;
 transition:.2s;
}

button:hover{
 transform:scale(1.05);
}

/* LEYENDA */
.leyenda{
 display:flex;
 justify-content:center;
 gap:15px;
 flex-wrap:wrap;
 margin-top:10px;
}

.item{
 background:#f4f6fb;
 padding:6px 10px;
 border-radius:10px;
 font-size:13px;
}

</style>
</head>

<body>

<div class="container">

<h1>🎟 Rifa Dispensador + Whiskey</h1>
<p class="sub">$20.000 COP · Lotería de Boyacá · 2 Mayo 2026</p>

<img src="dispensador_a.jpg" class="premio-img">

<p><b>Dispensador de licor en madera + Whiskey</b></p>

<p class="dispo">🎯 Disponibles: <span id="disponibles">100</span></p>

<div class="leyenda">
 <div class="item">🟩 Seleccionado</div>
 <div class="item">🟨 Reservado</div>
 <div class="item">🟥 Pagado</div>
</div>

<div id="grid" class="numbers-grid"></div>

<button onclick="sendWhatsApp()">Reservar</button>

</div>

<script>
const API_URL="https://script.google.com/macros/s/AKfycbxrLfMOdW-KBX0ZsdtGksay-aKwhVmY7lPSwANUpmklCHayRJhn8T9fJ2YJp2q-03sg/exec";
const WHATSAPP_NUMBER="3246860209";
const PRECIO=20000;

let estados={},selected=[];

/* CARGAR */
async function cargar(){
 let r=await fetch(API_URL+"?action=status");
 let j=await r.json();

 estados=j.data||{};
 document.getElementById("disponibles").innerText=j.stats?.disponibles||100;

 pintar();
}

/* PINTAR */
function pintar(){
 let g = document.getElementById("grid");
 g.innerHTML = "";

 for(let i=1;i<=100;i++){

  let d = document.createElement("div");
  d.className = "numero";
  d.innerText = i;

  let estado = estados[i]?.estado; // 👈 clave

  // 🔴 PAGADO (máxima prioridad)
  if(estado === "pagado"){
    d.classList.add("pagado");
    d.style.pointerEvents = "none";
  }

  // 🟡 RESERVADO
  else if(estado === "pendiente"){
    d.classList.add("reservado");
    d.style.pointerEvents = "none";
  }

  // 🟢 SELECCIONADO
  else if(selected.includes(i)){
    d.classList.add("selected");
  }

  // ⚪ DISPONIBLE
  else{
    d.onclick = () => {
      let idx = selected.indexOf(i);

      if(idx === -1){
        selected.push(i);
      }else{
        selected.splice(idx,1);
      }

      pintar();
    }
  }

  g.appendChild(d);
 }
}



/* WHATSAPP */
async function confirmarReserva(){

 let n = document.getElementById("nombre").value.trim();
 let w = document.getElementById("wa").value.trim();
 let c = document.getElementById("correo").value.trim();

 if(!n || !w){
   alert("Completa nombre y WhatsApp");
   return;
 }

 // guardar en backend
 for(let num of selected){
  await fetch(API_URL+"?action=register"
   +"&numero="+num
   +"&nombre="+encodeURIComponent(n)
   +"&wa="+encodeURIComponent(w)
   +"&correo="+encodeURIComponent(c)
  );
 }

 // mensaje PRO
 let msg =
`🎟 *SOLICITUD DE RESERVA - RIFA PREMIUM*

🎁 *Premio:* Dispensador de licor en madera + Whiskey
📅 *Sorteo:* 2 de mayo de 2026 - Lotería de Boyacá

🔢 *Números:* ${selected.join(", ")}
🎫 *Cantidad:* ${selected.length}
💰 *Valor unidad:* $20.000 COP
💵 *Total:* $${(selected.length * PRECIO).toLocaleString("es-CO")}

👤 *Nombre:* ${n}
📱 *WhatsApp:* ${w}
📧 *Correo:* ${c || "No registra"}

✅ Confirmo mi interés y procederé con el pago.`;

 // abrir WhatsApp
 window.open(
   `https://wa.me/57${w}?text=${encodeURIComponent(msg)}`,
   "_blank"
 );

 // reset
 selected = [];
 document.getElementById("modal").style.display = "none";
 cargar();
}

 if(selected.length==0){
   alert("Selecciona números");
   return;
 }

 let total = selected.length * PRECIO;

/* 👇 IMPORTANTE: AGREGA 57 */
 let telefono = "57" + WHATSAPP_NUMBER.replace(/\D/g,'');

 let msg =
`🎟 *SOLICITUD DE RESERVA - RIFA PREMIUM*

🎁 *Premio:* Dispensador de licor en madera + Whiskey
📅 *Sorteo:* 2 de mayo de 2026 (Lotería de Boyacá)

🔢 *Números:* ${selected.join(", ")}
🎫 *Cantidad:* ${selected.length}
💰 *Valor unitario:* $${PRECIO.toLocaleString()}
💵 *Total:* $${total.toLocaleString()}

✅ Confirmo mi interés y procederé con el pago.
🙏 Quedo atento a los datos de consignación.`;

let url = `https://wa.me/57${w}?text=${encodeURIComponent(msg)}`;
let win = window.open(url, "_blank");

if(!win){
  alert("Activa las ventanas emergentes para continuar");
}


cargar();
</script>

</body>
</html>
