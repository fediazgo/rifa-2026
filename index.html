<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rifa PRO++</title>

<style>
body{font-family:Arial;background:#eef5ff;margin:0;text-align:center}

/* HEADER */
header{background:#1A6FD4;color:white;padding:30px}
h1{margin:0}

.count{font-size:18px;margin-top:10px;font-weight:bold}

/* CONTADORES */
.stats{
  display:flex;
  justify-content:center;
  gap:20px;
  margin:15px;
  font-weight:bold;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(10,1fr);
  gap:5px;
  max-width:700px;
  margin:20px auto;
  background:white;
  padding:15px;
  border-radius:15px;
}

.num{
  padding:12px;
  border-radius:8px;
  border:1px solid #ccc;
  cursor:pointer;
}

.num:hover{background:#1A6FD4;color:white}

.pendiente{background:#FFF3E0;color:#FF6B2B;cursor:not-allowed}
.pagado{background:#E8F5E9;color:#17B86A;cursor:not-allowed}

/* MODAL */
.overlay{
  position:fixed;inset:0;
  background:rgba(0,0,0,.7);
  display:none;align-items:center;justify-content:center;
}

.modal{
  background:white;padding:20px;border-radius:10px;width:300px;
}

input{
  width:100%;padding:10px;margin:5px 0;
}

button{
  width:100%;padding:10px;background:#1A6FD4;color:white;border:none;
}
</style>
</head>

<body>

<header>
<h1>🎟️ RIFA PRO++</h1>
<div class="count">⏳ <span id="countdown"></span></div>

<div class="stats">
  <div>Disponibles: <span id="disp">0</span></div>
  <div>Pendientes: <span id="pend">0</span></div>
  <div>Pagados: <span id="pag">0</span></div>
</div>

</header>

<div class="grid" id="grid"></div>

<!-- MODAL -->
<div class="overlay" id="overlay">
  <div class="modal">
    <h3>Número <span id="num"></span></h3>

    <input id="nombre" placeholder="Nombre">
    <input id="wa" placeholder="WhatsApp">
    <input id="correo" placeholder="Correo">

    <button onclick="guardar()">Reservar</button>
  </div>
</div>

<script>
var URL = "https://script.google.com/macros/s/AKfycbxrLfMOdW-KBX0ZsdtGksay-aKwhVmY7lPSwANUpmklCHayRJhn8T9fJ2YJp2q-03sg/exec";

var data = {};
var selected = null;

/* CONTADOR */
var target = new Date("May 2, 2026 20:00:00").getTime();

setInterval(()=>{
  var now = new Date().getTime();
  var d = target - now;

  if(d<0){
    countdown.innerHTML="🎉 EN CURSO";
    return;
  }

  countdown.innerHTML =
    Math.floor(d/86400000)+"d "+
    Math.floor(d%86400000/3600000)+"h "+
    Math.floor(d%3600000/60000)+"m "+
    Math.floor(d%60000/1000)+"s";
},1000);

/* LOAD */
function load(){
 fetch(URL+"?action=list&pwd=1234")
 .then(r=>r.json())
 .then(res=>{
   if(res.ok){
     procesar(res.data);
   }
 });
}

/* PROCESAR */
function procesar(arr){
 data={};

 arr.forEach(x=>{
   data[x.numero]=x;
 });

 pintar();
}

/* GRID */
function pintar(){
 var g=document.getElementById("grid");
 g.innerHTML="";

 let disp=0, pend=0, pag=0;

 for(let i=0;i<100;i++){
   let n=i<10?"0"+i:i+"";
   let btn=document.createElement("div");
   btn.className="num";
   btn.innerText=n;

   let d=data[n];

   if(d){
     btn.title=d.nombre+" | "+d.wa;

     if(d.estado=="pagado"){
       btn.classList.add("pagado");
       pag++;
     }else{
       btn.classList.add("pendiente");
       pend++;
     }
   }else{
     disp++;
     btn.onclick=()=>abrir(n);
   }

   g.appendChild(btn);
 }

 dispSpan.innerText=disp;
 pendSpan.innerText=pend;
 pagSpan.innerText=pag;
}

/* MODAL */
function abrir(n){
 selected=n;
 num.innerText=n;
 overlay.style.display="flex";
}

/* GUARDAR */
function guardar(){
 let nombre=nombreInput.value.trim();
 let wa=waInput.value.trim();
 let correo=correoInput.value.trim();

 if(!nombre||!wa){
   alert("Completa datos");
   return;
 }

 fetch(URL+"?action=register"
 +"&numero="+selected
 +"&nombre="+nombre
 +"&wa="+wa
 +"&correo="+correo)
 .then(r=>r.json())
 .then(d=>{
   if(d.ok){
     overlay.style.display="none";
     load();
   }
 });
}

/* INIT */
var countdown=document.getElementById("countdown");
var dispSpan=document.getElementById("disp");
var pendSpan=document.getElementById("pend");
var pagSpan=document.getElementById("pag");

var num=document.getElementById("num");
var overlay=document.getElementById("overlay");

var nombreInput=document.getElementById("nombre");
var waInput=document.getElementById("wa");
var correoInput=document.getElementById("correo");

load();

/* AUTO REFRESH */
setInterval(load,10000);
</script>

</body>
</html>
