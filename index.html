<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rifa Premium</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>
body{font-family:Inter;background:#f5f1ea;text-align:center;padding:20px}

.numbers-grid{
 display:grid;
 grid-template-columns:repeat(auto-fill,minmax(70px,1fr));
 gap:10px;
 max-width:600px;
 margin:auto
}

.numero{
 padding:12px;
 border-radius:12px;
 background:#fff;
 border:2px solid #ddd;
 cursor:pointer;
 font-weight:700;
 transition:.2s;
}

.numero:hover{transform:scale(1.05)}

.numero.selected{background:#2c6e2e;color:#fff}
.numero.reservado{background:#ffd966;color:#000}
.numero.pagado{background:#e53935;color:#fff}

button{
 margin-top:20px;
 padding:12px 25px;
 border:none;
 border-radius:20px;
 background:#25D366;
 color:#fff;
 font-weight:700;
 cursor:pointer
}
</style>
</head>

<body>

<h1>🎟 Rifa Dispensador + Whiskey</h1>
<p>$20.000 COP - Lotería de Boyacá - 2 Mayo 2026</p>

<p style="font-weight:600;">
🎯 Disponibles: <span id="disponibles">100</span> / 100
</p>

<div class="numbers-grid" id="grid"></div>

<button onclick="sendWhatsApp()">Reservar por WhatsApp</button>

<p style="margin-top:15px; font-size:14px; color:#555;">
🔒 Reserva segura • Pago por Nequi / Daviplata • Sorteo con la Lotería de Boyacá  
</p>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbxrLfMOdW-KBX0ZsdtGksay-aKwhVmY7lPSwANUpmklCHayRJhn8T9fJ2YJp2q-03sg/exec";
const WHATSAPP_NUMBER = "3246860209";
const PRECIO_UNITARIO = 20000;

let estados = {};
let selectedNumbers = [];

// 🔄 Cargar estados
async function cargarEstados(){
    const res = await fetch(API_URL + "?action=status");
    const json = await res.json();

    if(json.ok){
        estados = json.data;
        actualizarContador(json.stats);
        pintar();
    }
}

// 🎯 contador
function actualizarContador(stats){
    if(stats){
        document.getElementById("disponibles").innerText = stats.disponibles;
    }
}

// 🔒 validación
function isTaken(num){
    return estados[num] && estados[num].estado !== "liberado";
}

// 🎨 pintar grid
function pintar(){
    let g = document.getElementById("grid");
    g.innerHTML = "";

    for(let i=1;i<=100;i++){
        let div = document.createElement("div");
        div.className="numero";
        div.innerText=i;

        if(estados[i]){
            if(estados[i].estado==="pendiente") div.classList.add("reservado");
            if(estados[i].estado==="pagado") div.classList.add("pagado");
        }
        else if(selectedNumbers.includes(i)){
            div.classList.add("selected");
        }

        if(!isTaken(i)){
            div.onclick=()=>{
                let idx = selectedNumbers.indexOf(i);
                if(idx===-1) selectedNumbers.push(i);
                else selectedNumbers.splice(idx,1);
                pintar();
            }
        }

        g.appendChild(div);
    }
}

// 📲 mensaje PRO
function buildWhatsAppMessage() {
    const lista = selectedNumbers.join(", ");
    const total = selectedNumbers.length * PRECIO_UNITARIO;

    let mensaje = `🎟️ RIFA DISPENSADOR + WHISKEY 🎟️\n`;
    mensaje += `\n🔢 Números: ${lista}`;
    mensaje += `\n💰 Total: $${total.toLocaleString('es-CO')} COP`;
    mensaje += `\n📅 Sorteo: 2 de mayo - Lotería de Boyacá`;
    mensaje += `\n\n✅ Solicito reservar estos números`;
    mensaje += `\n💳 Pago por Nequi / Daviplata`;

    return encodeURIComponent(mensaje);
}

// 🚀 enviar
async function sendWhatsApp(){
    if(selectedNumbers.length===0){
        alert("Selecciona números");
        return;
    }

    let nombre = prompt("Tu nombre:");
    let wa = prompt("Tu WhatsApp:");

    if(!nombre||!wa){
        alert("Datos obligatorios");
        return;
    }

    // 🔒 registrar en backend
    for(let num of selectedNumbers){
        let res = await fetch(API_URL + "?action=register"
            + "&numero="+num
            + "&nombre="+encodeURIComponent(nombre)
            + "&wa="+encodeURIComponent(wa)
        );

        let data = await res.json();

        if(!data.ok){
            alert(data.msg);
            await cargarEstados();
            return;
        }
    }

    await cargarEstados();

    let mensaje = buildWhatsAppMessage();

    window.open(`https://wa.me/${WHATSAPP_NUMBER}?text=${mensaje}`,"_blank");

    alert("⏳ Tienes 2 horas para pagar o se liberan los números");

    selectedNumbers=[];
    pintar();
}

// 🔄 iniciar
cargarEstados();
setInterval(cargarEstados, 10000);
</script>

</body>
</html>
