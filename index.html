```html
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rifa Premium</title>

<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&family=Bebas+Neue&display=swap" rel="stylesheet">

<style>
body{
 margin:0;
 font-family:'Nunito',sans-serif;
 background:linear-gradient(135deg,#0D3B7A,#1A6FD4);
 text-align:center;
 color:white;
}

.container{
 max-width:1200px;
 margin:20px auto;
 background:white;
 color:#0D2545;
 border-radius:20px;
 padding:20px;
}

h1{
 font-family:'Bebas Neue';
 font-size:42px;
 color:#0D3B7A;
}

.premio-img{
 width:220px;
 border-radius:15px;
 cursor:pointer;
 transition:.3s;
}
.premio-img:hover{transform:scale(1.05);}

.numbers-grid{
 display:grid;
 grid-template-columns:repeat(auto-fit,minmax(70px,1fr));
 gap:10px;
 margin-top:20px;
}

.numero{
 padding:16px;
 border-radius:10px;
 background:#e9eef7;
 font-weight:900;
 font-size:18px;
 cursor:pointer;
}

.selected{background:#17B86A;color:white;}
.reservado{background:#FFD966;}
.pagado{background:#E03434;color:white;}

button{
 margin-top:20px;
 padding:12px 25px;
 border:none;
 border-radius:25px;
 background:#17B86A;
 color:white;
 font-weight:bold;
 cursor:pointer;
}

.modal{
 display:none;
 position:fixed;
 top:0;left:0;
 width:100%;height:100%;
 background:rgba(0,0,0,.6);
 justify-content:center;
 align-items:center;
}

.modal-box{
 background:white;
 padding:20px;
 border-radius:15px;
 color:black;
 width:300px;
}

input{
 width:90%;
 padding:10px;
 margin:5px;
}

#imgModal img{
 max-width:90%;
 border-radius:20px;
}
</style>
</head>

<body>

<div class="container">
<h1>🎟 Rifa Dispensador + Whiskey</h1>

<img src="dispensador_a.jpg" class="premio-img" onclick="verImagen()">

<p><b>🎯 Disponibles: <span id="disponibles">100</span></b></p>

<div id="grid" class="numbers-grid"></div>

<button onclick="abrirModal()">Reservar</button>
</div>

<!-- MODAL FORM -->
<div id="modal" class="modal">
 <div class="modal-box">
  <h3>Datos</h3>
  <input id="nombre" placeholder="Nombre"><br>
  <input id="wa" placeholder="WhatsApp"><br>
  <input id="correo" placeholder="Correo (opcional)"><br>
  <button onclick="confirmarReserva()">Confirmar</button>
 </div>
</div>

<!-- IMAGEN ZOOM -->
<div id="imgModal" class="modal" onclick="this.style.display='none'">
 <img src="dispensador_a.jpg">
</div>

<script>
const API_URL="https://script.google.com/macros/s/AKfycbxrLfMOdW-KBX0ZsdtGksay-aKwhVmY7lPSwANUpmklCHayRJhn8T9fJ2YJp2q-03sg/exec";
const WHATSAPP_NUMBER="3246860209";
const PRECIO=20000;

let estados={},selected=[],bloqueado=false;

async function cargar(){
 let r=await fetch(API_URL+"?action=status");
 let j=await r.json();
 estados=j.data||{};
 document.getElementById("disponibles").innerText=j.stats?.disponibles||100;
 pintar();
}

function pintar(){
 let g=document.getElementById("grid");
 g.innerHTML="";

 for(let i=1;i<=100;i++){
  let d=document.createElement("div");
  d.className="numero";
  d.innerText=i;

  let estado=estados[i]?.estado;

  if(estado==="pagado") d.classList.add("pagado");
  else if(estado==="pendiente") d.classList.add("reservado");
  else if(selected.includes(i)) d.classList.add("selected");
  else{
    d.onclick=()=>{
      let idx=selected.indexOf(i);
      if(idx==-1) selected.push(i);
      else selected.splice(idx,1);
      pintar();
    }
  }

  g.appendChild(d);
 }
}

function abrirModal(){
 if(selected.length==0)return alert("Selecciona números");
 document.getElementById("modal").style.display="flex";
}

async function confirmarReserva(){
 if(bloqueado) return;
 bloqueado=true;

 let n=document.getElementById("nombre").value;
 let w=document.getElementById("wa").value;
 let c=document.getElementById("correo").value;

 if(!n||!w){
  alert("Completa datos");
  bloqueado=false;
  return;
 }

 for(let num of selected){
  await fetch(API_URL+"?action=register&numero="+num+
  "&nombre="+encodeURIComponent(n)+
  "&wa="+encodeURIComponent(w)+
  "&correo="+encodeURIComponent(c));
 }

 let msg=`🎟 SOLICITUD RIFA\nNumeros: ${selected.join(",")}`;

 window.open(`https://wa.me/57${WHATSAPP_NUMBER}?text=${encodeURIComponent(msg)}`,"_blank");

 selected=[];
 document.getElementById("modal").style.display="none";

 setTimeout(()=>{
  cargar();
  bloqueado=false;
 },1000);
}

function verImagen(){
 document.getElementById("imgModal").style.display="flex";
}

cargar();
</script>

</body>
</html>
```
