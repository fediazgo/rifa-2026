<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Rifa Premium</title>

<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&family=Bebas+Neue&display=swap" rel="stylesheet">

<style>
body{
 margin:0;
 font-family:'Nunito',sans-serif;
 background:linear-gradient(135deg,#0D3B7A,#1A6FD4);
}

/* LOGIN */
.login{
 position:fixed;
 inset:0;
 display:flex;
 justify-content:center;
 align-items:center;
 background:linear-gradient(135deg,#0D3B7A,#1A6FD4);
}

.box{
 background:white;
 padding:40px;
 border-radius:20px;
 text-align:center;
 width:300px;
}

input{
 width:100%;
 padding:12px;
 margin-top:10px;
 border-radius:10px;
 border:1px solid #ccc;
 text-align:center;
}

button{
 padding:10px 15px;
 border:none;
 border-radius:20px;
 background:#17B86A;
 color:white;
 font-weight:bold;
 cursor:pointer;
 margin-top:10px;
}

/* ADMIN */
.admin{
 display:none;
 padding:20px;
 color:white;
 text-align:center;
}

h1{
 font-family:'Bebas Neue';
 font-size:35px;
}

.grid{
 display:grid;
 grid-template-columns:repeat(10,1fr);
 gap:10px;
 max-width:600px;
 margin:20px auto;
}

.num{
 padding:15px;
 border-radius:10px;
 background:#ccc;
 color:black;
 font-weight:bold;
 cursor:pointer;
}

.pendiente{background:#FFD966;}
.pagado{background:#E03434;color:white;}

/* PANEL */
.panel{
 display:none;
 background:white;
 color:black;
 padding:20px;
 border-radius:15px;
 max-width:350px;
 margin:20px auto;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div class="login" id="login">
  <div class="box">
    <h2>🔐 Panel Admin</h2>
    <input type="password" id="clave" placeholder="Clave">
    <button onclick="login()">Ingresar</button>
    <p id="error" style="display:none;color:red;">Clave incorrecta</p>
  </div>
</div>

<!-- ADMIN -->
<div class="admin" id="admin">
  <h1>🎟 Panel Rifa</h1>
  <p>📅 Sorteo: 2 Mayo 2026</p>

  <div class="grid" id="grid"></div>

  <div class="panel" id="panel">
    <h3 id="numSel"></h3>
    <p id="info"></p>

    <button onclick="pagado()">💰 Pagado</button>
    <button onclick="pendiente()">⏳ Pendiente</button>
    <button onclick="liberar()">❌ Liberar</button>
  </div>
</div>

<script>
const API_URL="https://script.google.com/macros/s/AKfycbxrLfMOdW-KBX0ZsdtGksay-aKwhVmY7lPSwANUpmklCHayRJhn8T9fJ2YJp2q-03sg/exec";
const CLAVE="1234";

let estados={},actual=null;

/* LOGIN */
function login(){
 let c=document.getElementById("clave").value;

 if(c===CLAVE){
   document.getElementById("login").style.display="none";
   document.getElementById("admin").style.display="block";
   cargar();
 }else{
   document.getElementById("error").style.display="block";
 }
}

/* CARGAR */
async function cargar(){
 let r=await fetch(API_URL+"?action=status");
 let j=await r.json();
 estados=j.data||{};
 pintar();
}

/* PINTAR */
function pintar(){
 let g=document.getElementById("grid");
 g.innerHTML="";

 for(let i=1;i<=100;i++){
  let d=document.createElement("div");
  d.className="num";
  d.innerText=i;

  let e=estados[i];

  if(e){
    if(e.estado==="pendiente") d.classList.add("pendiente");
    if(e.estado==="pagado") d.classList.add("pagado");

    d.onclick=()=>{
      actual=i;
      document.getElementById("panel").style.display="block";
      document.getElementById("numSel").innerText="Número "+i;

      document.getElementById("info").innerHTML=
      "👤 "+e.nombre+"<br>"+
      "📱 "+e.wa+"<br>"+
      "Estado: "+e.estado;
    }
  }

  g.appendChild(d);
 }
}

/* ACCIONES */
async function pagado(){
 if(!actual)return;
 await fetch(API_URL+"?action=pay&numero="+actual);
 estados[actual].estado="pagado";
 pintar();
}

async function pendiente(){
 if(!actual)return;
 await fetch(API_URL+"?action=pendiente&numero="+actual);
 estados[actual].estado="pendiente";
 pintar();
}

async function liberar(){
 if(!actual)return;
 if(!confirm("Liberar número?"))return;

 await fetch(API_URL+"?action=delete&numero="+actual);
 delete estados[actual];
 pintar();
}

/* ENTER LOGIN */
document.getElementById("clave").addEventListener("keydown",e=>{
 if(e.key==="Enter") login();
});
</script>

</body>
</html>
