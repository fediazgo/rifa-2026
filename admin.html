```html
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Admin Rifa PRO</title>

<style>
body{
 font-family:Arial;
 background:#0D3B7A;
 color:white;
 text-align:center;
}

.grid{
 display:grid;
 grid-template-columns:repeat(auto-fit,minmax(80px,1fr));
 gap:10px;
 max-width:900px;
 margin:auto;
}

.item{
 padding:15px;
 border-radius:10px;
 background:#ccc;
 color:#000;
 cursor:pointer;
 font-weight:bold;
}

.pendiente{background:#FFD966;}
.pagado{background:#E03434;color:white;}

.panel{
 margin-top:20px;
 display:none;
}

button{
 margin:5px;
 padding:10px;
 border:none;
 border-radius:10px;
 cursor:pointer;
}
</style>
</head>

<body>

<h1>🎟 ADMIN RIFA</h1>

<div id="grid" class="grid"></div>

<div id="panel" class="panel">
<h3 id="numSel"></h3>
<p id="info"></p>

<button onclick="marcarPagado()">💰 Pagado</button>
<button onclick="marcarPendiente()">🟡 Reservar</button>
<button onclick="liberar()">❌ Liberar</button>
</div>

<script>
let clave=prompt("Clave");
if(clave!=="1234"){
 document.body.innerHTML="Acceso denegado";
}

const API_URL="https://script.google.com/macros/s/AKfycbxrLfMOdW-KBX0ZsdtGksay-aKwhVmY7lPSwANUpmklCHayRJhn8T9fJ2YJp2q-03sg/exec";

let estados={},actual=null;

async function cargar(){
 let r=await fetch(API_URL+"?action=status");
 let j=await r.json();
 estados=j.data||{};
 pintar();
}

function pintar(){
 let g=document.getElementById("grid");
 g.innerHTML="";

 for(let i=1;i<=100;i++){
  let d=document.createElement("div");
  d.className="item";
  d.innerText=i;

  let estado=estados[i]?.estado;

  if(estado==="pendiente") d.classList.add("pendiente");
  if(estado==="pagado") d.classList.add("pagado");

  d.onclick=()=>{
    actual=i;
    document.getElementById("panel").style.display="block";
    document.getElementById("numSel").innerText="Número "+i;

    if(estados[i]){
      document.getElementById("info").innerText=estado;
    }else{
      document.getElementById("info").innerText="Disponible";
    }
  }

  g.appendChild(d);
 }
}

async function marcarPagado(){
 await fetch(API_URL+"?action=pay&numero="+actual);
 cargar();
}

async function marcarPendiente(){
 await fetch(API_URL+"?action=register&numero="+actual+"&nombre=ADMIN&wa=0");
 cargar();
}

async function liberar(){
 await fetch(API_URL+"?action=delete&numero="+actual);
 cargar();
}

cargar();
setInterval(cargar,5000);
</script>

</body>
</html>
```
